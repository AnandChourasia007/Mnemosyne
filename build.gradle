plugins {
    id 'java-library'
}

repositories {
    mavenCentral()
}

dependencies {
    // Standard testing framework
    testImplementation 'org.junit.jupiter:junit-jupiter:5.12.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

testing {
    suites {
        test {
            useJUnitJupiter()
        }
    }
}
